services:
  python:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 8000
      WEB_CONCURRENCY: 2
      GUNICORN_TIMEOUT: 120
    labels:
      - "traefik.backend=${podName}-python"
      - "traefik.frontend.rule=Host:${hostRule}"
      - "traefik.docker.network=${podName}_frontend"
      - "traefik.port=8000"
    networks:
      - frontend

networks:
  frontend: