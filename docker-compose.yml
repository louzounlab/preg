services:
  web:
    build: .
    image: modelssite:latest
    container_name: modelssite
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 8000
      WEB_CONCURRENCY: 2
      GUNICORN_TIMEOUT: 120
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/Home"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # Note: per-request artifacts written by the twin-fwe adapter live under
    # /app/static/<timestamp>/ and are intentionally NOT persisted across
    # restarts — mounting a volume over /app/static would shadow the baked-in
    # CSS/JS/CSV assets shipped in the image. Users can resubmit the form to
    # regenerate them.
